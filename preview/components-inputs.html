<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F2EB; padding: 28px 32px; font-family: 'Jost', sans-serif; }
  .label { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: #B8975A; margin-bottom: 10px; }
  .rule { height:1px; background:rgba(196,168,130,0.2); margin: 16px 0; }
  .input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.6); border:1px solid rgba(196,168,130,0.3); color:#2C2416; font-family:'Jost',sans-serif; font-size:0.875rem; outline:none; }
  .input-focus { width:100%; padding:12px 16px; background:white; border:1px solid #B8975A; color:#2C2416; font-family:'Jost',sans-serif; font-size:0.875rem; outline:none; }
  .row { display:flex; gap:12px; }
</style>
</head>
<body>
  <div class="label">Input · Default</div>
  <input class="input" placeholder="Buscar productos, marcas, ingredientes..." style="margin-bottom:4px;">
  <div class="rule"></div>
  <div class="label">Input · Focus</div>
  <input class="input-focus" value="Vitamina C sérum" style="margin-bottom:4px;">
  <div class="rule"></div>
  <div class="label">Select / Variant</div>
  <div class="row">
    <div style="padding:10px 16px; border:1px solid rgba(196,168,130,0.3); font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:#6A5A42;">30 ML</div>
    <div style="padding:10px 16px; border:1px solid #2C2416; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:#2C2416; background:rgba(44,36,22,0.04);">50 ML</div>
    <div style="padding:10px 16px; border:1px solid rgba(196,168,130,0.3); font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:#C4A882; text-decoration:line-through;">100 ML</div>
  </div>
  <div style="font-size:0.5rem; letter-spacing:0.15em; text-transform:uppercase; color:#C4A882; margin-top:6px;">Normal · Selected · Agotado</div>
</body>
</html>
