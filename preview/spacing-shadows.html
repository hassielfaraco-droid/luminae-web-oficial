<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400&family=Cormorant+Garamond:wght@300&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #E8DDD0; padding: 28px 32px; font-family: 'Jost', sans-serif; }
  .row { display: flex; gap: 20px; align-items: flex-start; }
  .card {
    background: #F7F2EB;
    padding: 20px 24px;
    flex: 1;
    text-align: center;
  }
  .label { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: #B8975A; margin-bottom: 10px; }
  .sub { font-size: 0.6rem; color: #6A5A42; margin-top: 6px; font-weight: 300; }
  .rule { height: 1px; background: rgba(196,168,130,0.2); margin: 20px 0; }
</style>
</head>
<body>
  <div class="row">
    <div class="card" style="box-shadow: 0 2px 12px rgba(44,36,22,0.06);">
      <div class="label">shadow-sm</div>
      <div style="font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:#2C2416;">Sérum</div>
      <div class="sub">Header on scroll, subtle lift</div>
    </div>
    <div class="card" style="box-shadow: 0 8px 32px rgba(44,36,22,0.10);">
      <div class="label">shadow-md</div>
      <div style="font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:#2C2416;">Productos</div>
      <div class="sub">Dropdown, modals</div>
    </div>
    <div class="card" style="box-shadow: 0 20px 60px rgba(44,36,22,0.14);">
      <div class="label">shadow-lg</div>
      <div style="font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:#2C2416;">Carrito</div>
      <div class="sub">Cart drawer, search overlay</div>
    </div>
  </div>
  <div class="rule"></div>
  <div style="height:1px; background:linear-gradient(90deg,transparent,#C4A882,transparent); opacity:0.4; margin-bottom:8px;"></div>
  <div style="font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; color:#B8975A;">divider-gold · gradient rule</div>
</body>
</html>
