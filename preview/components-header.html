<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:'Satoshi'; src:url('../fonts/Satoshi-Bold.otf') format('opentype'); font-weight:700; }
  @font-face { font-family:'Satoshi'; src:url('../fonts/Satoshi-Black.otf') format('opentype'); font-weight:900; }
  @font-face { font-family:'Plus Jakarta Sans'; src:url('../fonts/PlusJakartaSans-VariableFont_wght.ttf') format('truetype'); font-weight:200 800; font-style:normal; }
  @font-face { font-family:'Inter'; src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#FFF8F0; font-family:'Inter',sans-serif; }

  /* Announce */
  .announce {
    background:#2C2416; color:#D8CBBE;
    text-align:center; padding:9px 24px;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:0.58rem; letter-spacing:0.2em; text-transform:uppercase;
  }
  .announce em { color:#B8975A; font-style:normal; }

  /* Header */
  .header {
    background:#FFF8F0;
    border-bottom:1px solid rgba(44,36,22,0.08);
    padding:0 40px;
  }
  .header-inner {
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    height:72px;
    max-width:1280px;
    margin:0 auto;
  }

  /* Nav left */
  .nav { display:flex; gap:28px; align-items:center; }
  .nav a {
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:0.62rem; letter-spacing:0.14em;
    text-transform:uppercase; font-weight:400;
    color:#8E8A6C; text-decoration:none;
    transition:color 0.18s;
  }
  .nav a:hover { color:#2C2416; }

  /* Logo — center */
  .logo {
    font-family:'Satoshi',sans-serif;
    font-size:1.55rem; font-weight:900;
    letter-spacing:0.22em; color:#2C2416;
    text-transform:uppercase; line-height:1;
    white-space:nowrap;
  }

  /* Utility right */
  .util { display:flex; align-items:center; gap:22px; justify-content:flex-end; }
  .util-btn {
    background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:#8E8A6C; transition:color 0.18s; padding:0;
  }
  .util-btn:hover { color:#2C2416; }
  .util-btn span {
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:0.46rem; letter-spacing:0.14em; text-transform:uppercase; font-weight:500;
  }

  /* Search */
  .search {
    display:flex; align-items:center; gap:8px;
    background:#F0E8DC; border:1px solid rgba(44,36,22,0.1);
    height:34px; padding:0 12px; width:200px;
  }
  .search input {
    background:transparent; border:none; outline:none;
    font-family:'Inter',sans-serif; font-size:0.78rem;
    color:#2C2416; width:100%; font-weight:300;
  }
  .search input::placeholder { color:#8E8A6C; }

  /* Nav bar */
  .navbar {
    background:#2C2416;
    border-top:none;
  }
  .navbar-inner {
    max-width:1280px; margin:0 auto;
    padding:0 40px; display:flex; align-items:stretch;
  }
  .navbar a {
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:0.62rem; letter-spacing:0.16em; text-transform:uppercase; font-weight:500;
    color:#D8CBBE; text-decoration:none;
    padding:13px 18px; display:block;
    transition:color 0.18s, background 0.18s;
    white-space:nowrap;
  }
  .navbar a:hover { color:#FFF8F0; background:rgba(255,255,255,0.05); }
</style>
</head>
<body>

  <!-- Announce bar -->
  <div class="announce">
    🌿 Envíos a toda Venezuela &nbsp;·&nbsp;
    <em>Paga con Zelle, Binance o transferencia USD</em>
    &nbsp;·&nbsp; Envío gratis en pedidos +$60
  </div>

  <!-- Main header -->
  <div class="header">
    <div class="header-inner">

      <!-- Search left -->
      <div class="search">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8E8A6C" stroke-width="1.8">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Buscar productos, marcas…">
      </div>

      <!-- Logo center -->
      <div style="text-align:center;">
        <div class="logo">LUMINAE</div>
      </div>

      <!-- Utility right -->
      <div class="util">
        <button class="util-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Mi cuenta</span>
        </button>
        <button class="util-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
          </svg>
          <span>Favoritos</span>
        </button>
        <button class="util-btn" style="position:relative;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span>Carrito</span>
          <span style="position:absolute;top:-3px;right:-3px;width:15px;height:15px;border-radius:50%;background:#B8975A;color:#2C2416;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.48rem;font-weight:700;display:flex;align-items:center;justify-content:center;">2</span>
        </button>
      </div>

    </div>
  </div>

  <!-- Nav bar -->
  <div class="navbar">
    <div class="navbar-inner">
      <a href="#">Skin</a>
      <a href="#">Perfumería</a>
      <a href="#">Wellness</a>
      <a href="#">Marcas</a>
      <a href="#">Ofertas</a>
      <a href="#">Sets</a>
      <a href="#">Blog</a>
    </div>
  </div>

</body>
</html>
