<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luminae — Skincare & Belleza Venezuela</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── Brand fonts — local ─────────────────────────────── */
@font-face { font-family:'Satoshi'; src:url('../fonts/Satoshi-Light.otf') format('opentype'); font-weight:300; font-style:normal; font-display:swap; }
@font-face { font-family:'Satoshi'; src:url('../fonts/Satoshi-Regular.otf') format('opentype'); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:'Satoshi'; src:url('../fonts/Satoshi-Medium.otf') format('opentype'); font-weight:500; font-style:normal; font-display:swap; }
@font-face { font-family:'Satoshi'; src:url('../fonts/Satoshi-Bold.otf') format('opentype'); font-weight:700; font-style:normal; font-display:swap; }
@font-face { font-family:'Satoshi'; src:url('../fonts/Satoshi-Black.otf') format('opentype'); font-weight:900; font-style:normal; font-display:swap; }
@font-face { font-family:'Plus Jakarta Sans'; src:url('../fonts/PlusJakartaSans-VariableFont_wght.ttf') format('truetype'); font-weight:200 800; font-style:normal; font-display:swap; }
@font-face { font-family:'Plus Jakarta Sans'; src:url('../fonts/PlusJakartaSans-Italic-VariableFont_wght.ttf') format('truetype'); font-weight:200 800; font-style:italic; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-Italic-VariableFont_opsz_wght.ttf') format('truetype'); font-weight:100 900; font-style:italic; font-display:swap; }

:root {
  --font-headline: 'Satoshi', system-ui, sans-serif;
  --font-display:  'Cormorant Garamond', Georgia, serif;
  --font-ui:       'Plus Jakarta Sans', system-ui, sans-serif;
  --font-body:     'Inter', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body { background: #F7F2EB; color: #2C2416; font-family: var(--font-body); font-weight: 400; }
::selection { background: #B8975A; color: #2C2416; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #E8DDD0; }
::-webkit-scrollbar-thumb { background: #C4A882; border-radius: 3px; }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes slideLeft{ from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes slideRight{ from{transform:translateX(-100%)} to{transform:translateX(0)} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* ─────────────── RESPONSIVE OVERRIDES ─────────────── */
[data-r="hamburger"]{ display:none; }
[data-r="mobile-nav"]{ display:none; }

@media (max-width: 1024px){
  /* 6/5 col product grids → 4 cols on tablet */
  [style*="grid-template-columns: repeat(6, 1fr)"]{ grid-template-columns: repeat(4,1fr) !important; }
  [style*="grid-template-columns: repeat(5, 1fr)"]{ grid-template-columns: repeat(4,1fr) !important; }
  /* Footer 4-col → 2x2 */
  [style*="grid-template-columns: 1.6fr 1fr 1fr 1fr"]{ grid-template-columns: 1fr 1fr !important; gap:32px !important; }
  /* Catalog/Help 240px sidebar → smaller */
  [style*="grid-template-columns: 240px 1fr"]{ grid-template-columns: 200px 1fr !important; gap:24px !important; }
  /* Account 220px sidebar → smaller */
  [style*="grid-template-columns: 220px 1fr"]{ grid-template-columns: 180px 1fr !important; gap:24px !important; }
  /* Padding shrink for big section containers */
  [style*="padding: 0 64px"]{ padding-left:32px !important; padding-right:32px !important; }
}

@media (max-width: 768px){
  /* Page container paddings */
  [style*="padding: 0 40px"]{ padding-left:18px !important; padding-right:18px !important; }
  [style*="padding: 0 48px"]{ padding-left:18px !important; padding-right:18px !important; }
  [style*="padding: 0 64px"]{ padding-left:18px !important; padding-right:18px !important; }
  [style*="padding: 0 32px"]{ padding-left:16px !important; padding-right:16px !important; }
  [style*="padding: 28px 48px"]{ padding:20px 18px 60px !important; }
  [style*="padding: 32px 40px"]{ padding:20px 18px 60px !important; }
  [style*="padding: 40px 40px"]{ padding:24px 18px 60px !important; }
  [style*="padding: 40px 48px"]{ padding:24px 18px 60px !important; }
  [style*="padding: 48px 40px"]{ padding:28px 18px 60px !important; }
  [style*="padding: 56px 40px"]{ padding:32px 18px 60px !important; }
  [style*="padding: 72px 40px"]{ padding:40px 18px 56px !important; }
  [style*="padding: 36px 48px"]{ padding:24px 18px !important; }
  [style*="padding: 0 40px 40px"]{ padding:0 18px 28px !important; }

  /* Hero / banner section paddings */
  [style*="padding: 56px 0"]{ padding:36px 0 !important; }
  [style*="padding: 64px 0"]{ padding:40px 0 !important; }
  [style*="padding: 80px 0"]{ padding:48px 0 !important; }
  [style*="padding: 48px 0"]{ padding:32px 0 !important; }

  /* All multi-col grids collapse */
  [style*="grid-template-columns: 1fr 1fr 1fr"]{ grid-template-columns: 1fr !important; }
  [style*="grid-template-columns: 1.6fr 1fr 1fr 1fr"]{ grid-template-columns: 1fr !important; gap:28px !important; }
  [style*="grid-template-columns: repeat(6, 1fr)"]{ grid-template-columns: repeat(2,1fr) !important; }
  [style*="grid-template-columns: repeat(5, 1fr)"]{ grid-template-columns: repeat(2,1fr) !important; }
  [style*="grid-template-columns: repeat(4, 1fr)"]{ grid-template-columns: repeat(2,1fr) !important; }
  [style*="grid-template-columns: repeat(3, 1fr)"]{ grid-template-columns: repeat(2,1fr) !important; gap:12px !important; }
  [style*="grid-template-columns: 1fr 1fr"]:not([style*="1fr 1fr 1fr"]){ grid-template-columns: 1fr !important; gap:18px !important; }
  [style*="grid-template-columns: 240px 1fr"]{ grid-template-columns: 1fr !important; gap:20px !important; }
  [style*="grid-template-columns: 220px 1fr"]{ grid-template-columns: 1fr !important; gap:20px !important; }
  [style*="grid-template-columns: 1.5fr 1fr"]{ grid-template-columns: 1fr !important; gap:20px !important; }
  [style*="grid-template-columns: 1.4fr 1fr"]{ grid-template-columns: 1fr !important; gap:0 !important; }

  /* Fixed-height hero blocks become auto */
  [data-r="home-hero"]{ height:auto !important; }
  [data-r="home-hero"] > div{ min-height:260px; }
  [data-r="home-hero"] [style*="font-size: 5.5rem"]{ font-size:3.8rem !important; }
  [data-r="home-hero"] [style*="font-size: 2.5rem"]{ font-size:1.6rem !important; }
  [data-r="home-hero"] [style*="font-size: 14rem"]{ font-size:9rem !important; }

  /* Header — hide search + nav + action labels, show hamburger */
  [data-r="header-grid"]{ grid-template-columns: auto 1fr auto !important; column-gap:8px !important; height:64px !important; padding:0 14px !important; }
  [data-r="header-search"]{ display:none !important; }
  [data-r="header-actions"]{ gap:14px !important; }
  [data-r="header-action-label"]{ display:none !important; }
  [data-r="header-logo"] > div{ font-size:1.1rem !important; letter-spacing:0.18em !important; }
  [data-r="hamburger"]{ display:flex !important; }
  [data-r="nav-bar"]{ display:none !important; }
  [data-r="account-icon"]{ display:none !important; }

  /* Announce bar smaller */
  [data-r="announce"]{ font-size:0.5rem !important; padding:7px 12px !important; letter-spacing:0.16em !important; }

  /* Catalog filters — slide-in drawer */
  [data-r="catalog-sidebar"]{ position:fixed !important; top:0 !important; left:0; bottom:0; width:min(340px,86vw); background:#F7F2EB !important; z-index:65; transform:translateX(-100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); overflow-y:auto; box-shadow:8px 0 32px rgba(44,36,22,0.18); border:none !important; padding:0 !important; display:flex !important; flex-direction:column; }
  [data-r="catalog-sidebar"][data-open="true"]{ transform:translateX(0); }
  [data-r="catalog-sidebar"] [data-r="sidebar-body"]{ flex:1; overflow-y:auto; padding:8px 18px 16px; }
  [data-r="catalog-sidebar"] > div:first-child{ display:flex !important; }
  [data-r="catalog-sidebar"] [data-r="mobile-filter-footer"]{ display:flex !important; }
  [data-r="catalog-sidebar"] > div:first-child + div > div:first-child{ display:none !important; }
  [data-r="mobile-filter-toggle"]{ display:flex !important; }
  [data-r="mobile-filter-backdrop"]{ display:block !important; }

  /* Big display text */
  [style*="font-size: 2.5rem"]{ font-size:1.7rem !important; }
  [style*="font-size: 2.2rem"]{ font-size:1.55rem !important; }
  [style*="font-size: 2rem"]{ font-size:1.4rem !important; }
  [style*="font-size: 1.8rem"]{ font-size:1.3rem !important; }

  /* PDP image thumbnails — smaller */
  [data-r="pdp-thumbs"] > div{ width:54px !important; height:54px !important; }

  /* Account hero stack */
  [data-r="account-hero"]{ padding:24px 18px !important; gap:14px !important; }

  /* CartDrawer fills more on mobile */
  [data-r="cart-drawer"]{ width:100vw !important; max-width:100vw !important; }

  /* Footer bottom row stacks */
  [data-r="footer-bottom"]{ flex-direction:column !important; align-items:flex-start !important; gap:14px !important; text-align:left !important; }

  /* Marcas sticky letter index */
  [data-r="marcas-letters"]{ top:64px !important; padding:8px 14px !important; }
  [data-r="marcas-letters"] a{ padding:4px 8px !important; font-size:0.68rem !important; }
}

@media (max-width: 480px){
  [style*="grid-template-columns: repeat(6, 1fr)"],
  [style*="grid-template-columns: repeat(5, 1fr)"],
  [style*="grid-template-columns: repeat(4, 1fr)"]{ gap:10px !important; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- modules: load in dependency order; each ends with Object.assign(window,…) or window.X = X -->
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="productCard.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="catalog.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [page, setPage] = useState({ name: 'home' });
  const [cart, setCart] = useState([]);
  const [favs, setFavs] = useState(new Set());
  const [cartOpen, setCartOpen] = useState(false);

  // Scroll to top on page change
  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [page]);

  const onAddToCart = (product) => {
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      const addQty = product.qty || 1;
      if (existing) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + addQty } : i);
      return [...prev, { ...product, qty: addQty }];
    });
    setCartOpen(true);
  };
  const onUpdateQty = (id, qty) => {
    if (qty <= 0) return setCart(prev => prev.filter(i => i.id !== id));
    setCart(prev => prev.map(i => i.id === id ? { ...i, qty } : i));
  };
  const onRemove = (id) => setCart(prev => prev.filter(i => i.id !== id));
  const toggleFav = (id) => setFavs(prev => {
    const next = new Set(prev);
    next.has(id) ? next.delete(id) : next.add(id);
    return next;
  });

  const cartCount = cart.reduce((s,i) => s + i.qty, 0);

  let view;
  switch (page.name) {
    case 'home':
      view = React.createElement(HomePage, { setPage, onAddToCart, favs, toggleFav });
      break;
    case 'catalog':
      view = React.createElement(CatalogPage, { setPage, cat: page.cat || 'all', initialQ: page.q || '', onAddToCart, favs, toggleFav });
      break;
    case 'pdp':
      view = React.createElement(PDPPage, { product: page.product, setPage, onAddToCart, favs, toggleFav });
      break;
    case 'favorites':
      view = React.createElement(FavoritesPage, { setPage, favs, toggleFav, onAddToCart });
      break;
    case 'marcas':
      view = React.createElement(MarcasPage, { setPage });
      break;
    case 'blog':
      view = React.createElement(BlogPage, { setPage });
      break;
    case 'blogPost':
      view = React.createElement(BlogPostPage, { setPage, post: page.post });
      break;
    case 'help':
      view = React.createElement(HelpPage, { setPage, topic: page.topic });
      break;
    case 'about':
      view = React.createElement(AboutPage, { setPage });
      break;
    case 'contact':
      view = React.createElement(ContactPage, { setPage });
      break;
    case 'account':
      view = React.createElement(AccountPage, { setPage, initialTab: page.tab || 'datos', favs, toggleFav, onAddToCart });
      break;
    case 'checkout':
      view = React.createElement(CheckoutPage, { setPage, items: cart });
      break;
    default:
      view = React.createElement(HomePage, { setPage, onAddToCart, favs, toggleFav });
  }

  return React.createElement('div', { 'data-screen-label': pageLabel(page) },
    React.createElement(Header, { setPage, cartCount, openCart: () => setCartOpen(true), favCount: favs.size, currentPage: page }),
    view,
    React.createElement(CartDrawer, {
      isOpen: cartOpen, onClose: () => setCartOpen(false),
      items: cart, onUpdateQty, onRemove, setPage
    })
  );
}

function pageLabel(p) {
  if (p.name === 'catalog') return `Catalog · ${p.cat || 'all'}`;
  if (p.name === 'pdp') return `PDP · ${p.product?.title || ''}`;
  if (p.name === 'blogPost') return `Blog · ${p.post?.title || ''}`;
  if (p.name === 'help') return `Help · ${p.topic || 'faq'}`;
  return p.name.charAt(0).toUpperCase() + p.name.slice(1);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
