<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F2EB; padding: 28px 32px; font-family: 'Jost', sans-serif; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
  .label { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: #B8975A; margin-bottom: 10px; }
  .rule { height:1px; background:rgba(196,168,130,0.2); margin-bottom:16px; }
  .tag { font-size:0.6rem; letter-spacing:0.25em; text-transform:uppercase; font-weight:500; padding:4px 10px; }
</style>
</head>
<body>
  <div class="label">Product Tags</div>
  <div class="row">
    <span class="tag" style="background:#2C2416; color:#B8975A;">Nuevo</span>
    <span class="tag" style="background:#8B2020; color:white;">Oferta</span>
    <span class="tag" style="background:#7A8C6E; color:white;">Bestseller</span>
    <span class="tag" style="background:rgba(44,36,22,0.6); color:#F7F2EB;">Agotado</span>
  </div>
  <div class="rule"></div>
  <div class="label">Payment method pills</div>
  <div class="row">
    <span style="font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; border:1px solid rgba(196,168,130,0.3); padding:3px 10px; color:#6A5A42;">Zelle</span>
    <span style="font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; border:1px solid rgba(196,168,130,0.3); padding:3px 10px; color:#6A5A42;">Binance</span>
    <span style="font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; border:1px solid rgba(196,168,130,0.3); padding:3px 10px; color:#6A5A42;">Zinli</span>
    <span style="font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; border:1px solid rgba(196,168,130,0.3); padding:3px 10px; color:#6A5A42;">PayPal</span>
    <span style="font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; border:1px solid rgba(196,168,130,0.3); padding:3px 10px; color:#6A5A42;">USD</span>
  </div>
  <div class="rule"></div>
  <div class="label">Cart badge</div>
  <div class="row">
    <div style="position:relative; display:inline-flex; width:32px; height:32px; align-items:center; justify-content:center; background:#F7F2EB;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6A5A42" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span style="position:absolute; top:-4px; right:-4px; width:16px; height:16px; border-radius:50%; background:#B8975A; color:#2C2416; font-size:0.6rem; font-weight:600; display:flex; align-items:center; justify-content:center;">3</span>
    </div>
    <div style="font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; color:#C4A882; margin-left:8px;">Cart count badge — gold, on ShoppingBag icon</div>
  </div>
</body>
</html>
