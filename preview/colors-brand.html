<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:'Plus Jakarta Sans'; src:url('../fonts/PlusJakartaSans-VariableFont_wght.ttf') format('truetype'); font-weight:200 800; font-style:normal; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#FFF8F0; font-family:'Plus Jakarta Sans',sans-serif; padding:28px 32px; }
  .row { display:flex; gap:0; }
  .swatch { flex:1; }
  .swatch-block { height:100px; width:100%; }
  .swatch-info { padding:12px 14px; border:1px solid rgba(44,36,22,0.06); border-top:none; }
  .swatch-name { font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; font-weight:600; color:#2C2416; margin-bottom:3px; }
  .swatch-hex  { font-size:0.65rem; color:#8E8A6C; font-weight:400; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="swatch-block" style="background:#2C2416;"></div>
      <div class="swatch-info">
        <div class="swatch-name">Deep Brown</div>
        <div class="swatch-hex">#2C2416</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch-block" style="background:#B8975A;"></div>
      <div class="swatch-info">
        <div class="swatch-name">Gold</div>
        <div class="swatch-hex">#B8975A</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch-block" style="background:#8E8A6C;"></div>
      <div class="swatch-info">
        <div class="swatch-name">Soft Olive</div>
        <div class="swatch-hex">#8E8A6C</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch-block" style="background:#D8CBBE;"></div>
      <div class="swatch-info">
        <div class="swatch-name">Warm Sand</div>
        <div class="swatch-hex">#D8CBBE</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch-block" style="background:#FFF8F0; outline:1px solid rgba(44,36,22,0.08);"></div>
      <div class="swatch-info">
        <div class="swatch-name">Cream</div>
        <div class="swatch-hex">#FFF8F0</div>
      </div>
    </div>
  </div>
</body>
</html>
