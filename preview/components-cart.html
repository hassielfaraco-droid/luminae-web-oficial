<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #E8DDD0; font-family: 'Jost', sans-serif; }
  .drawer { background:#F7F2EB; width:320px; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(44,36,22,0.14); }
  .drawer-head { display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid rgba(196,168,130,0.2); }
  .drawer-title { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:300; color:#2C2416; }
  .drawer-count { font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; color:#C4A882; margin-top:2px; }
  .item { display:flex; gap:12px; padding:14px 20px; border-bottom:1px solid rgba(196,168,130,0.12); }
  .item-img { width:60px; height:60px; background:#E8DDD0; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#C4A882; font-size:1.2rem; }
  .item-title { font-family:'Cormorant Garamond',serif; font-size:0.85rem; color:#2C2416; line-height:1.3; }
  .item-vendor { font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; color:#C4A882; margin-bottom:4px; }
  .item-price { font-size:0.8rem; font-weight:500; color:#2C2416; }
  .qty { display:flex; align-items:center; border:1px solid rgba(196,168,130,0.3); margin-top:8px; width:fit-content; }
  .qty button { padding:4px 8px; font-size:0.7rem; color:#6A5A42; background:none; border:none; cursor:pointer; }
  .qty span { padding:0 10px; font-size:0.8rem; color:#2C2416; }
  .footer { padding:16px 20px; border-top:1px solid rgba(196,168,130,0.2); }
  .total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .total-label { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:#2C2416; }
  .total-val { font-size:1rem; font-weight:500; color:#2C2416; }
  .divider { height:1px; background:linear-gradient(90deg,transparent,#C4A882,transparent); opacity:0.3; margin-bottom:12px; }
  .btn { display:block; text-align:center; padding:14px; font-size:0.68rem; letter-spacing:0.22em; text-transform:uppercase; font-family:'Jost',sans-serif; cursor:pointer; margin-bottom:8px; }
  .btn-p { background:#2C2416; color:#F7F2EB; border:1px solid transparent; }
  .btn-s { background:transparent; color:#2C2416; border:1px solid rgba(44,36,22,0.25); }
</style>
</head>
<body>
  <div style="padding:20px;">
    <div class="drawer">
      <div class="drawer-head">
        <div>
          <div class="drawer-title">Tu carrito</div>
          <div class="drawer-count">2 productos</div>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C4A882" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <div class="item">
        <div class="item-img">◈</div>
        <div>
          <div class="item-vendor">La Roche-Posay</div>
          <div class="item-title">Sérum Vitamina C Antioxidante</div>
          <div class="item-price">$42.00</div>
          <div class="qty"><button>−</button><span>1</span><button>+</button></div>
        </div>
      </div>
      <div class="item">
        <div class="item-img">◈</div>
        <div>
          <div class="item-vendor">CeraVe</div>
          <div class="item-title">Hidratante Facial SPF 30</div>
          <div class="item-price">$28.00</div>
          <div class="qty"><button>−</button><span>1</span><button>+</button></div>
        </div>
      </div>
      <div class="footer">
        <div class="total-row"><span class="total-label">Total</span><span class="total-val">$70.00</span></div>
        <div class="divider"></div>
        <div class="btn btn-p">Finalizar compra →</div>
        <div class="btn btn-s">Seguir comprando</div>
        <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
          <span style="font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;border:1px solid rgba(196,168,130,0.2);padding:2px 8px;color:#C4A882;">Zelle</span>
          <span style="font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;border:1px solid rgba(196,168,130,0.2);padding:2px 8px;color:#C4A882;">Binance</span>
          <span style="font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;border:1px solid rgba(196,168,130,0.2);padding:2px 8px;color:#C4A882;">PayPal</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
