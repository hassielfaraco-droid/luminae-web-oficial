<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F2EB; padding: 28px 32px; font-family: 'Jost', sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px 24px; }
  .item { }
  .bar { height: 8px; margin-bottom: 8px; }
  .meta { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: #6A5A42; }
  .val  { font-size: 0.6rem; color: #C4A882; margin-top: 2px; font-weight: 300; }
  .section-label { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: #B8975A; margin-bottom: 14px; }
  .rule { height: 1px; background: rgba(196,168,130,0.2); margin: 16px 0; }
  .shadow-demo { background: #F7F2EB; height: 40px; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="section-label">Spacing scale</div>
  <div class="grid">
    <div class="item"><div class="bar" style="width:4px; background:#2C2416;"></div><div class="meta">4px</div><div class="val">--space-1</div></div>
    <div class="item"><div class="bar" style="width:8px; background:#2C2416;"></div><div class="meta">8px</div><div class="val">--space-2</div></div>
    <div class="item"><div class="bar" style="width:12px; background:#2C2416;"></div><div class="meta">12px</div><div class="val">--space-3</div></div>
    <div class="item"><div class="bar" style="width:16px; background:#2C2416;"></div><div class="meta">16px</div><div class="val">--space-4</div></div>
    <div class="item"><div class="bar" style="width:24px; background:#2C2416;"></div><div class="meta">24px</div><div class="val">section-padding sm</div></div>
    <div class="item"><div class="bar" style="width:32px; background:#2C2416;"></div><div class="meta">32px</div><div class="val">btn padding-x</div></div>
    <div class="item"><div class="bar" style="width:40px; background:#2C2416;"></div><div class="meta">40px</div><div class="val">section-padding md</div></div>
    <div class="item"><div class="bar" style="width:64px; background:#2C2416;"></div><div class="meta">64px</div><div class="val">section-padding lg</div></div>
  </div>
  <div class="rule"></div>
  <div class="section-label">Border radius</div>
  <div style="display:flex; gap:20px; align-items:center;">
    <div style="text-align:center;">
      <div style="width:48px; height:48px; background:#2C2416; border-radius:0; margin:0 auto 6px;"></div>
      <div class="meta">0</div><div class="val">Buttons, cards, inputs</div>
    </div>
    <div style="text-align:center;">
      <div style="width:32px; height:32px; background:#2C2416; border-radius:50%; margin:0 auto 6px;"></div>
      <div class="meta">full</div><div class="val">Wishlist btn, badge</div>
    </div>
    <div style="text-align:center;">
      <div style="width:48px; height:8px; background:#C4A882; border-radius:3px; margin:0 auto 6px;"></div>
      <div class="meta">3px</div><div class="val">Scrollbar thumb only</div>
    </div>
  </div>
</body>
</html>
